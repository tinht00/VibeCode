services:
  postgres:
    image: postgres:16-alpine
    container_name: etsy-research-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etsy_research_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-etsy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etsy_password}
    volumes:
      - etsy_research_pgdata:/var/lib/postgresql/data

  backend:
    image: python:3.13-slim
    container_name: etsy-research-backend
    depends_on:
      - postgres
    working_dir: /app
    command: >
      sh -c "pip install -e .[dev] &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      ETSY_API_KEY: ${ETSY_API_KEY}
      ETSY_CLIENT_ID: ${ETSY_CLIENT_ID}
      ETSY_REDIRECT_URI: ${ETSY_REDIRECT_URI}
      ETSY_SCOPES: ${ETSY_SCOPES}
      APP_BASE_URL: ${APP_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
    volumes:
      - ../backend:/app

  frontend:
    image: node:22-alpine
    container_name: etsy-research-frontend
    depends_on:
      - backend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    volumes:
      - ../frontend:/app

volumes:
  etsy_research_pgdata:
